global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Node exporter — CPU, memory, disk I/O
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  # DCGM exporter — GPU metrics (VRAM, utilization, temp, power)
  - job_name: nvidia-dcgm
    static_configs:
      - targets: ['nvidia-exporter:9400']

  # vLLM native Prometheus metrics (/metrics endpoint)
  - job_name: vllm
    static_configs:
      - targets: ['vllm-engine:8000']
    metrics_path: /metrics

  # llama.cpp metrics (if /metrics endpoint is available)
  - job_name: llamacpp
    static_configs:
      - targets: ['llamacpp-engine:8080']
    metrics_path: /metrics
